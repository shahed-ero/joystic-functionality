<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Edition - Jaw</title>
    <link rel="icon" type="image/png" href="player.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="menu">
    <h1>Music & Play</h1>
    <button onclick="startGame()">Play</button>
    <button onclick="toggleMusic()" id="btn-music">Music: OFF</button>
</div>

<div id="game">
    <canvas id="canvas" width="800" height="500"></canvas>
    <p id="mission-complete"></p>
    <button onclick="backMenu()" id="btn-back">Back</button>
    <div id="joy-container">
        <div id="joy-stick"></div>
    </div>
</div>

<audio id="bgm" src="music.mp3" loop></audio>

<!-- Link to external JavaScript -->
<script src="app.js"></script>

</body>
</html>
